<!DOCTYPE html>
<html>
    <head>
        <title>calc</title>
        <link rel="stylesheet" href="./s.css">
    </head>
    <body>
        <div class="container">
            <div class="input">
                <input type="text" class="number" id="main-display">
            </div>
            <div class="history">
                <input type="text" class="number hnumber" id="history-display">
                <p class="drop" id="operator-display">-</p>
            </div>
        </div>
        <div class="keyboard">
            <div class="row">
                <button id="one" class="numkey">1</button>
                <button id="two" class="numkey">2</button>
                <button id="three" class="numkey">3</button>
                <button id="mult" class="numkey">*</button>
                <button id="div" class="numkey">/</button>
            </div>
            <div class="row">
                <button id="four" class="numkey">4</button>
                <button id="five" class="numkey">5</button>
                <button id="six" class="numkey">6</button>
                <button id="add" class="numkey">+</button>
                <button id="minus" class="numkey">-</button>
            </div>
            <div class="row">
                <button id="seven" class="numkey">7</button>
                <button id="eight" class="numkey">8</button>
                <button id="nine" class="numkey">9</button>
                <button id="zero" class="numkey">0</button>
                <button id="equal" class="numkey">=</button>
            </div>
        </div>
        <script src="./t.js"></script>
    </body>
</html>
